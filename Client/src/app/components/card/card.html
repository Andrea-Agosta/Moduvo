<div class="group cursor-pointer">
  <div class="relative overflow-hidden rounded-lg mb-4">
    <img [src]="data()?.images?.[0]" [alt]="data()?.name" [class]="['w-full object-cover transition-transform', imageStyle()]" />
    @if(data()?.originalPrice){
    <div
      class="absolute top-3 left-3 bg-destructive text-destructive-foreground px-2 py-1 rounded text-sm font-medium">
      Sale
    </div>
    }
    <div class="absolute inset-0 bg-black/20 group-hover:bg-black/10 transition-colors"></div>
  </div>

  <div class="space-y-2">
    <h3 class="font-semibold group-hover:text-primary transition-colors">{{data()?.name}}</h3>
    <ng-content></ng-content>
  </div>
</div>
