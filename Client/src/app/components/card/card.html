<div
  class="group bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-all duration-300 cursor-pointer">
  <div class="relative overflow-hidden">
    <img [src]="imgUrl()" class="w-full h-64 object-cover group-hover:scale-105 transition-transform duration-300" />
    <ng-content select="[card-badge]"></ng-content>
  </div>

  <div class="p-4">
    @if(overline()){
    <p class="text-sm text-gray-500 mb-1">{{overline()}}</p>
    }
    <h3 class="font-semibold mb-2 group-hover:text-amber-600 transition-colors">
      <a [routerLink]="linkUrl()">{{title()}}</a>
    </h3>

    @if(description()){
    <p class="text-muted-foreground">{{ description() }}</p>
    }

    @if(rating()){
    <div class="flex items-center space-x-2 mb-3">
      <div class="flex items-center">
        <svg lucideStar class="w-4 h-4 fill-yellow-400 text-yellow-400" />
        <span class="text-sm text-gray-600 ml-1">
          {{rating()}} ({{reviews()}})
        </span>
      </div>
    </div>
    }
    <ng-content></ng-content>
  </div>
</div>
