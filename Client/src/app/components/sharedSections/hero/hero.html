<section class="relative bg-gradient-to-r from-amber-50 to-orange-50 py-20">
	<div class="container mx-auto px-4">
		<div class="grid md:grid-cols-2 gap-12 items-center">
			<div>
				<h2 class="text-5xl font-bold text-foreground mb-6">
					{{title()}}
					<span class="text-primary"> {{secondLineTitle()}}</span>
				</h2>
				<p class="text-xl text-muted-foreground mb-8">
					{{description()}}
				</p>
				<ng-content></ng-content>
			</div>
			<div class="relative">
				<img [src]="imgUrl()" [alt]="imgAlt()" class="rounded-lg shadow-2xl" />
			</div>
		</div>
	</div>
</section>
