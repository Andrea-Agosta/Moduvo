<nav class="bg-white shadow-md sticky top-0 z-40">
	<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
		<div class="flex justify-between items-center h-16">
			<a [routerLink]="['/']" class="text-2xl font-bold text-amber-600">
				CraftHome
			</a>

			<div class="flex items-center space-x-4">
				<a [routerLink]="['/products']" class="text-gray-700 hover:text-amber-600 transition-colors">
					Products
				</a>
				<a [routerLink]="['/categories']" class="text-gray-700 hover:text-amber-600 transition-colors">
					Categories
				</a>
				<a [routerLink]="['/products/deals']" class="text-gray-700 hover:text-amber-600 transition-colors">
					Deals
				</a>
				<a [routerLink]="['/about']" class="text-gray-700 hover:text-amber-600 transition-colors">
					About
				</a>

				<a routerLink]="['/cart']" class="relative">
					<button uiButton variant="ghost" size="icon">
						<svg lucideShoppingCart class="h-5 w-5" />
						@if(!isCartEmpty()){
						<span
							class="absolute -top-1 -right-1 bg-amber-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">
							{{ totalItems() }}
						</span>
						}
					</button>
				</a>

				@if (user()){
					<div class="flex items-center space-x-2">
						<span class="text-gray-700">Hi, {{user()?.name}}</span>
						<button
							uiButton
							variant="ghost"
							size="icon"
							(click)="handleLogout()"
							title="Logout"
						>
							<svg lucideLogOut class="h-5 w-5" />
						</button>
					</div>
				} @else {
					<a [routerLink]="['/auth']">
						<button uiButton variant="ghost" size="icon">
							<svg lucideUser class="h-5 w-5" />
						</button>
					</a>
				}
			</div>
		</div>
	</div>
</nav>
