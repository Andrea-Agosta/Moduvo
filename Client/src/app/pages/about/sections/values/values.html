<section class="py-16">
  <div class="max-w-7xl mx-auto px-4">
    <div class="text-center mb-12">
      <h2 class="text-3xl font-bold text-gray-900 mb-4">Why Choose Moduvo?</h2>
      <p class="text-xl text-gray-600">Our commitment to excellence in every aspect</p>
    </div>

    <div class="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
      @for(value of values; track $index){
        <div class="text-center bg-white p-6 rounded-lg shadow-md">
          <div class="bg-amber-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
            @switch (value.icon) {
              @case ('heart')  { <svg lucideHeart  class="h-8 w-8 text-amber-600" /> }
              @case ('truck')  { <svg lucideTruck  class="h-8 w-8 text-amber-600" /> }
              @case ('shield') { <svg lucideShield class="h-8 w-8 text-amber-600" /> }
              @case ('users')  { <svg lucideUsers  class="h-8 w-8 text-amber-600" /> }
            }
          </div>
          <h3 class="text-xl font-semibold text-gray-900 mb-3">{{value.title}}</h3>
          <p class="text-gray-600">{{value.description}}</p>
        </div>
      }
    </div>
  </div>
</section>
