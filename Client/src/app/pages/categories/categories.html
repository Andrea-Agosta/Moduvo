<div class="min-h-screen bg-gray-50">
  <div class="max-w-7xl mx-auto px-4 py-12">
    <div class="text-center mb-12">
      <h1 class="text-4xl font-bold text-gray-900 mb-4">Shop by Category</h1>
      <p class="text-xl text-gray-600">Find the perfect furniture for every room in your home</p>
    </div>
    @if (isCategoryLoading()){
    Loading...
    } @else {
    <section class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      @for( category of categories(); track category.id){
      <div class="group bg-white rounded-lg shadow-md overflow-hidden hover:shadow-xl transition-all duration-300">
        <div class="relative overflow-hidden">
          <img [src]="category.image" [alt]="category.name"
            class="w-full h-64 object-cover group-hover:scale-105 transition-transform duration-300" />
          <div class="absolute inset-0 bg-black/40 group-hover:bg-black/30 transition-all duration-300">
          </div>
          <div class="absolute bottom-4 left-4 text-white">
            <h3 class="text-2xl font-bold">{{category.name}}</h3>
            <p class="text-gray-200">{{category.productCount}} products</p>
          </div>
        </div>

        <div class="p-6">
          <p class="text-gray-600 mb-4">{{category.description}}</p>
          <a uiButton class="w-full bg-amber-600 hover:bg-amber-700 text-white"
            [routerLink]="['/products']"
            [queryParams]="{ category: category.name.toLowerCase().replace(' ', '-') }"
            >
            Browse {{category.name}}
            <svg lucideArrowRight class="ml-2 h-4 w-4" />
          </a>
        </div>
      </div>
      }
    </section>
    }
  </div>
</div>
