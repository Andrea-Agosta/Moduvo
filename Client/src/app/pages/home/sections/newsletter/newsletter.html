<section class="py-16 bg-primary text-primary-foreground">
  <div class="container mx-auto px-4 text-center">
    <h2 class="text-3xl font-bold mb-4">Stay in the Loop</h2>
    <p class="text-xl mb-8 opacity-90">Get exclusive deals and new arrivals delivered to your inbox</p>
    <div class="flex max-w-md mx-auto space-x-4">
      <input appInput type="email" placeholder="Enter your email" class="bg-white text-foreground" />
      <button uiButton [variant]="'secondary'">
        Subscribe
      </button>
    </div>
  </div>
</section>
