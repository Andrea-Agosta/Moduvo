@if(!error()){
  <section class="py-16 bg-muted/20">
    <div class="container mx-auto px-4">
      <h2 class="text-3xl font-bold text-center mb-12">Shop by Category</h2>
      <div class="grid md:grid-cols-4 gap-6">
        @if (isCategoryLoading()) {
          <h1>Loading...</h1>
        } @else {
          @for (category of categories(); track category.name) {
            <article class="rounded-lg border bg-card p-4 shadow-sm">
              <img [src]="category.image" [alt]="category.name" class="mb-3 h-40 w-full rounded-md object-cover" />
              <h3 class="font-semibold">{{ category.name }}</h3>
              <p class="text-muted-foreground">{{ category.count }}</p>
            </article>
          }
        }
      </div>
    </div>
  </section>
}
