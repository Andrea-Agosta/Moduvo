<section class="relative bg-gradient-to-r from-amber-50 to-orange-50 py-20">
    <div class="container mx-auto px-4">
        <div class="grid md:grid-cols-2 gap-12 items-center">
            <div>
                <h2 class="text-5xl font-bold text-foreground mb-6">
                    Transform Your Space with
                    <span class="text-primary"> Premium Furniture</span>
                </h2>
                <p class="text-xl text-muted-foreground mb-8">
                    Discover our curated collection of modern, sustainable furniture designed to elevate your home.
                </p>
                <div class="flex space-x-4">
                    <a uiButton [size]="'lg'" [routerLink]="['/products']">
                        Shop Now
                    </a>
                    <!-- TODO: add functionality to this button -->
                    <button uiButton [variant]="'outline'" [size]="'lg'">
                        View Collections
                    </button>
                </div>
            </div>
            <div class="relative">
                <!-- TODO: remember to fix this with Backend -->
                <img src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=600&h=400&fit=crop"
                    alt="Modern furniture" class="rounded-lg shadow-2xl" />
            </div>
        </div>
    </div>
