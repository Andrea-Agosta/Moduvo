<section class="space-y-4">
  <div class="aspect-square bg-white rounded-lg overflow-hidden shadow-md">
    <img [src]="product()?.images?.[selectedImage()]" alt="product.name" class="w-full h-full object-cover" />
  </div>
  <div class="grid grid-cols-4 gap-2">
    @for (image of product()?.images; track $index ){
    <button (click)="onSelectedImage($index)" class="aspect-square bg-white rounded-lg overflow-hidden border-2"
      [class.border-amber-500]="selectedImage() === $index" [class.border-gray-200]="selectedImage() !== $index">
      <img [src]="image" alt="{{ product()?.name }} {{ $index + 1 }}" class="w-full h-full object-cover" />
    </button>
    }
  </div>
</section>
