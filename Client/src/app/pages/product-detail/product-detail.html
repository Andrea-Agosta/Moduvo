<div class="min-h-screen bg-gray-50">
  <div class="max-w-7xl mx-auto px-4 py-8">
    <a uiButton [routerLink]="['/products']" class="text-amber-600 hover:text-amber-700 flex items-center mb-8">
      <svg lucideArrowLeft class="mr-2 h-4 w-4" />
      Back to Products
    </a>
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-12">
      @if (product()) {
      <app-image-gallery [product]="product()"></app-image-gallery>
      <app-product-info [product]="product()"></app-product-info>
      }
    </div>
  </div>
</div>
